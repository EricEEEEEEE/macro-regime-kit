name: Feature request
description: Suggest a safe improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety boundary
      options:
        - label: This does not require trading, withdrawal, transfer, or wallet-signing permissions.
          required: true

