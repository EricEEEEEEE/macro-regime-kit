name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m unittest discover tests
      - name: Compile check
        run: PYTHONPYCACHEPREFIX=/tmp/macro-regime-pycache python -m compileall -q src tests
      - name: CLI smoke
        run: |
          export MACRO_REGIME_HOME="$RUNNER_TEMP/macro-regime-home"
          macro-regime --version
          macro-regime init
          macro-regime doctor || test $? -eq 1
          macro-regime skill-install --target "$RUNNER_TEMP/skills"
          test -f "$RUNNER_TEMP/skills/macro-regime-monitor/SKILL.md"
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Build distribution
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*

